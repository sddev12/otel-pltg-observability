##################### Grafana Configuration — Local Docker Compose #####################
#
# Minimal config for local development.
# Based on grafana-12.4.2/conf/sample.ini — see that file for the full list of options.

app_mode = development
instance_name = local_grafana

#################################### Paths ####################################
[paths]
# Tell Grafana where to find provisioning files (datasources, dashboards, etc.)
# Inside the container this maps to /etc/grafana/provisioning via the Docker volume mount.
provisioning = /etc/grafana/provisioning

#################################### Server ###################################
[server]
http_port = 3000
domain = localhost
root_url = http://localhost:3000/

#################################### Security #################################
[security]
# Default admin credentials for local dev — change these in any real environment.
admin_user = admin
admin_password = admin
# Disable the "change password on first login" prompt so the UI is immediately usable.
disable_initial_admin_creation = false

#################################### Users ####################################
[users]
# Allow anyone to sign up locally (handy for team demos).
allow_sign_up = false

#################################### Anonymous Auth ###########################
[auth.anonymous]
# Enable anonymous access so you can open dashboards without logging in locally.
enabled = true
org_name = Main Org.
org_role = Viewer

#################################### Logging ##################################
[log]
mode = console
level = info

#################################### Feature Toggles ##########################
[feature_toggles]
# Enable "correlation" links between datasources so you can jump from a
# Prometheus metric to related Loki logs with a single click.
enable = correlations
